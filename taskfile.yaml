tasks:
  default:
    desc: List available tasks
    cmds:
      - task --list
    silent: true

  # third_party:reactronx-react-electron

  third_party:reactronx-react-electron:build:
    desc: Build @reactronx/react-electron
    cmds:
      - pnpm --filter @reactronx/react-electron run build

  # patrol:webui

  patrol:webui:clear:
    desc: Clear webui
      - pnpm --filter @patrol/patrol-webui run clear

  patrol:webui:build:
    desc: Build webui
    deps:
      - patrol:webui:clear
    cmds:
      - pnpm --filter @patrol/patrol-webui run build

  patrol:webui:start:
    desc: Start webui
    cmds:
      - pnpm --filter @patrol/patrol-webui run start

  # patrol:app

  patrol:app:clear-bundles:
    desc: Clear the bundles directory
    cmds:
      - pnpm --filter @patrol/patrol-app run clear:bundles

  patrol:app:build:
    desc: Build the Patrol application shell
    deps:
      - patrol:app:clear-bundles
      - third_party:reactronx-react-electron:build
    cmds:
      - pnpm --filter @patrol/patrol-app run build

  patrol:app:clear-package:
    desc: Clear the package directory
    cmds:
      - pnpm --filter @patrol/patrol-app run clear:package

  patrol:app:package:
    desc: Package the app using electron-builder
    deps:
      - patrol:app:build
      - patrol:app:clear-package
    cmds:
      - pnpm --filter @patrol/patrol-app run package

  patrol:app:start:
    desc: Start the app using electron
    deps:
      - patrol:app:build
    cmds:
      - pnpm --filter @patrol/patrol-app run start

  # main

  start:
    desc: Start the application in development mode
    failfast: true
    cmds:
      - pnpm exec concurrently 'task patrol:webui:start' 'task patrol:app:start'

