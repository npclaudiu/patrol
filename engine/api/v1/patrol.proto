syntax = "proto3";

package patrol.v1;

option go_package = "github.com/npclaudiu/patrol/engine/patrold/internal/api/v1;patrolv1";

service EngineService {
  rpc Ping(PingRequest) returns (PingResponse) {}
}

message PingRequest {
  string message = 1;
}

message PingResponse {
  string reply = 1;
}
