version: "3"

vars:
  ENGINE_WORKSPACE_DIR: engine
  ENGINE_MAIN_MODULE_DIR: engine/patrold
  AIR_VERSION: v1.64.5
  SHELL_FILTER: "./shell/*"
  ENGINE_MODULES:
    sh: |
      cd {{.ENGINE_WORKSPACE_DIR}}
      go work edit -json | awk -F'"' '/"DiskPath"/ {print $4}' | sed 's#^\./##' | tr '\n' ' ' | sed 's/[[:space:]]*$//'

tasks:
  default:
    desc: List available tasks
    cmds:
      - task --list
    silent: true

  install:
    desc: Install JavaScript/TypeScript dependencies
    cmds:
      - pnpm install

  go:work:sync:
    desc: Sync module dependencies declared in the engine Go workspace (may update go.mod/go.sum files)
    dir: "{{.ENGINE_WORKSPACE_DIR}}"
    cmds:
      - go work sync

  go:compile:
    desc: Compile all Go packages from modules in the engine workspace
    dir: "{{.ENGINE_WORKSPACE_DIR}}"
    cmds:
      - for: { var: ENGINE_MODULES, split: ' ' }
        cmd: go -C {{.ITEM}} test -run '^$' ./...

  go:build:
    desc: Build Go command binaries from modules in the engine workspace
    deps:
      - go:compile
    dir: "{{.ENGINE_WORKSPACE_DIR}}"
    cmds:
      - for: { var: ENGINE_MODULES, split: ' ' }
        cmd: |
          if [ -e ../.task/go/bin/{{.ITEM}} ] && [ ! -d ../.task/go/bin/{{.ITEM}} ]; then
            rm -f ../.task/go/bin/{{.ITEM}}
          fi
          mkdir -p ../.task/go/bin/{{.ITEM}}
          mains="$(go -C {{.ITEM}} list -json ./... | awk '
            /"ImportPath":/ {ip=$2; gsub(/[",]/, "", ip)}
            /"Name": "main"/ {if (ip != "") print ip}
          ')"
          if [ -z "$mains" ]; then
            echo "No main packages found in module {{.ITEM}}; skipping binary output."
          else
            for mainpkg in $mains; do
              go -C {{.ITEM}} build -o ../../.task/go/bin/{{.ITEM}}/ "$mainpkg"
            done
          fi

  go:test:
    desc: Run Go tests from modules in the engine workspace
    dir: "{{.ENGINE_WORKSPACE_DIR}}"
    cmds:
      - for: { var: ENGINE_MODULES, split: ' ' }
        cmd: go -C {{.ITEM}} test ./...

  go:vet:
    desc: Run go vet from modules in the engine workspace
    dir: "{{.ENGINE_WORKSPACE_DIR}}"
    cmds:
      - for: { var: ENGINE_MODULES, split: ' ' }
        cmd: go -C {{.ITEM}} vet ./...

  go:run:
    desc: Run patrold from the main engine module
    dir: "{{.ENGINE_MAIN_MODULE_DIR}}"
    cmds:
      - go run .

  go:dev:
    desc: Run patrold with live-reloading via air
    dir: "{{.ENGINE_MAIN_MODULE_DIR}}"
    cmds:
      - |
        if command -v air >/dev/null 2>&1; then
          air -c .air.toml
        else
          go run github.com/air-verse/air@{{.AIR_VERSION}} -c .air.toml
        fi

  go:tidy:
    desc: Tidy Go dependencies for all modules in the engine workspace
    dir: "{{.ENGINE_WORKSPACE_DIR}}"
    cmds:
      - for: { var: ENGINE_MODULES, split: ' ' }
        cmd: go -C {{.ITEM}} mod tidy

  shell:build:
    desc: Build all workspace packages that declare a build script
    cmds:
      - pnpm -r --filter "{{.SHELL_FILTER}}" --if-present run build

  shell:dev:
    desc: Run all workspace dev/watch scripts
    cmds:
      - pnpm -r --parallel --stream --filter "{{.SHELL_FILTER}}" --if-present run dev

  shell:check:
    desc: Run lint and typechecking for shell workspaces
    cmds:
      - pnpm -r --filter "{{.SHELL_FILTER}}" --if-present run lint
      - pnpm -r --filter "{{.SHELL_FILTER}}" --if-present run typecheck

  shell:fix:
    desc: Run Biome to fix formatting and linting issues
    cmds:
      - pnpm -r --filter "{{.SHELL_FILTER}}" --if-present run format

  build:
    desc: Build Go modules and shell workspaces
    deps:
      - go:build
      - shell:build

  dev:
    desc: Start the development environment (concurrent Go backend and JS frontend)
    deps:
      - go:dev
      - shell:dev

  check:
    desc: Run linting, typechecking, and vet checks
    deps:
      - go:vet
      - shell:check

  fix:
    desc: Fix all formatting issues automatically
    deps:
      - shell:fix
    dir: "{{.ENGINE_WORKSPACE_DIR}}"
    cmds:
      - for: { var: ENGINE_MODULES, split: ' ' }
        cmd: go -C "{{.ITEM}}" fmt ./...
  
  test:
    desc: Run Go tests and JavaScript/TypeScript tests where available
    deps:
      - go:test
    cmds:
      - pnpm -r --filter "{{.SHELL_FILTER}}" --if-present run test
