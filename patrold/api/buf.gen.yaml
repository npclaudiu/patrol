version: v2
plugins:
  # TypeScript Base Protocols
  - local: protoc-gen-es
    out: src/gen
    opt: target=ts
  
  # TypeScript Connect-RPC clients
  - local: protoc-gen-connect-es
    out: src/gen
    opt: target=ts

